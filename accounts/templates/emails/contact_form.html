{% extends "emails/base_email.html" %}
{% block title %}New Contact Message{% endblock %}
{% block content %}
<h2 style="margin:0 0 16px; font-size:18px;">New Contact Message Received</h2>
<p style="margin:0 0 12px; line-height:1.5;"><strong>From:</strong> {{ full_name }} ({{ email }})</p>
<p style="margin:0 0 12px; line-height:1.5;"><strong>Subject:</strong> {{ subject }}</p>
<hr style="border:0; border-top:1px solid #e5e7eb; margin:16px 0;">
<p style="margin:0 0 8px; line-height:1.5; font-weight:bold;">Message:</p>
<p style="margin:0; line-height:1.5; white-space:pre-wrap; background-color:#f9fafb; padding:12px; border-radius:6px; border:1px solid #e5e7eb;">{{ message }}</p>
{% endblock %}
